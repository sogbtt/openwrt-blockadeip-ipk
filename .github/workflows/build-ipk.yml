name: Build OpenWrt BlockadeIP IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget tar zstd

      - name: Download OpenWrt SDK
        run: |
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
      
      - name: Update OpenWrt feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: Copy packages into SDK
        run: |
          mkdir -p sdk/package/custom
          cp -r package/blockadeip sdk/package/custom/blockadeip
          cp -r package/luci-app-blockadeip sdk/package/custom/luci-app-blockadeip

      - name: Prepare SDK config
        working-directory: sdk
        run: |
          echo "CONFIG_PACKAGE_blockadeip=m" > .config
          echo "CONFIG_PACKAGE_luci-app-blockadeip=m" >> .config
          make defconfig

      - name: Build packages
        working-directory: sdk
        run: |
          make package/custom/blockadeip/compile V=s
          make package/custom/luci-app-blockadeip/compile V=s

      - name: Collect IPK files
        run: |
          mkdir -p artifact
          find sdk/bin/packages -name '*blockadeip*.ipk' -exec cp {} artifact/ \;
          ls -lah artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-blockadeip-ipk-x86_64-24.10.0
          path: artifact/*.ipk
