<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BlockadeIP 拦截记录</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Microsoft YaHei",sans-serif;background:#101418;color:#e8eef5}
    .wrap{max-width:1040px;margin:0 auto;padding:36px 18px}
    .hero{background:linear-gradient(135deg,#1d2733,#111820);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px;box-shadow:0 16px 50px rgba(0,0,0,.22)}
    h1{margin:0 0 8px;font-size:30px}.sub{color:#9fb0c3;margin:0 0 24px;line-height:1.7}.num{font-size:52px;font-weight:800;letter-spacing:-1px}.muted{color:#9fb0c3}
    table{width:100%;border-collapse:collapse;margin-top:22px;background:rgba(255,255,255,.03);border-radius:14px;overflow:hidden;table-layout:fixed}
    th,td{text-align:left;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);word-break:break-all}th{color:#b7c6d7;font-weight:600;background:rgba(255,255,255,.04)}tr:last-child td{border-bottom:none}
    .pill{display:inline-block;padding:4px 9px;border-radius:999px;background:#27364a;color:#cfe1ff;font-size:12px}.footer{margin-top:18px;color:#74869a;font-size:13px;line-height:1.7}
    .ip{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#fff}.reason{color:#d8e7ff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>BlockadeIP 安全拦截记录</h1>
      <p class="sub">系统已启用早期入站封禁策略。异常登录、SSH 爆破、WEB 后台爆破等高风险来源将被记录并拦截。</p>
      <div class="muted">当前封禁数量</div>
      <div class="num" id="total">--</div>
      <div class="muted">更新时间：<span id="updated">--</span></div>
      <table>
        <thead><tr><th style="width:22%">时间</th><th style="width:12%">动作</th><th style="width:22%">来源 IP</th><th style="width:10%">次数</th><th>原因</th></tr></thead>
        <tbody id="rows"><tr><td colspan="5" class="muted">读取中...</td></tr></tbody>
      </table>
      <div class="footer">公开页按完整 IP 展示拦截记录，用于安全威慑。请确认该页面暴露范围符合你的运维策略。</div>
    </div>
  </div>
<script>
function esc(v){return String(v == null ? '' : v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
fetch('data.json?ts=' + Date.now()).then(r => r.json()).then(d => {
  document.getElementById('total').textContent = d.total_banned || 0;
  document.getElementById('updated').textContent = d.updated_at || '--';
  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  const items = d.items || [];
  if (!items.length) {
    rows.innerHTML = '<tr><td colspan="5" class="muted">暂无拦截记录</td></tr>';
    return;
  }
  items.slice().reverse().forEach(x => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + esc(x.time) + '</td><td><span class="pill">' + esc(x.action) + '</span></td><td class="ip">' + esc(x.ip) + '</td><td>' + esc(x.count || 0) + '</td><td class="reason">' + esc(x.reason) + '</td>';
    rows.appendChild(tr);
  });
}).catch(() => {
  document.getElementById('rows').innerHTML = '<tr><td colspan="5" class="muted">data.json 暂不可读</td></tr>';
});
</script>
</body>
</html>
