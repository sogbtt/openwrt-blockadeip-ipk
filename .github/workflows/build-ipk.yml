name: Build OpenWrt BlockadeIP IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file gawk gettext git libncurses5-dev libssl-dev python3 rsync unzip wget zstd

      - name: Download OpenWrt 24.10.0 x86_64 SDK
        run: |
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          echo "SDK_DIR=${SDK_DIR}" >> "$GITHUB_ENV"

      - name: Prepare feeds and custom packages
        run: |
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/custom
          cp -r "$GITHUB_WORKSPACE/package/blockadeip" package/custom/blockadeip
          cp -r "$GITHUB_WORKSPACE/package/luci-app-blockadeip" package/custom/luci-app-blockadeip
          make defconfig

      - name: Compile packages
        run: |
          cd "$SDK_DIR"
          make package/custom/blockadeip/compile V=s
          make package/custom/luci-app-blockadeip/compile V=s

      - name: Collect IPK artifacts
        run: |
          mkdir -p artifacts
          find "$SDK_DIR/bin/packages" -type f \( -name 'blockadeip*.ipk' -o -name 'luci-app-blockadeip*.ipk' \) -print -exec cp {} artifacts/ \;
          ls -lah artifacts

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-blockadeip-ipk-x86_64-24.10.0
          path: artifacts/*.ipk
